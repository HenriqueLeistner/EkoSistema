<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ekobrazil - Login</title>
    <link rel="stylesheet" href="login.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌿</text></svg>">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <!-- Logo -->
            <div class="logo-section">
                <img src="logo.png" alt="Ekobrazil Logo" class="logo-image">
            </div>
            
            <!-- Header -->
            <div class="login-header">
                <h1>🌿 Ekobrazil</h1>
                <h2>Sistema de Clientes</h2>
                <p>Inteligência Ecológica</p>
            </div>

            <!-- Login Form -->
            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="username">Usuário:</label>
                    <input type="text" id="username" name="username" required placeholder="Digite seu usuário">
                </div>

                <div class="form-group">
                    <label for="password">Senha:</label>
                    <input type="password" id="password" name="password" required placeholder="Digite sua senha">
                </div>

                <div class="form-group">
                    <label class="checkbox-container">
                        <input type="checkbox" id="rememberMe" name="rememberMe">
                        <span class="checkmark"></span>
                        Lembrar de mim
                    </label>
                </div>

                <button type="submit" class="login-btn">
                    <span id="loginBtnText">Entrar</span>
                    <div id="loginSpinner" class="spinner" style="display: none;"></div>
                </button>

                <div id="errorMessage" class="error-message" style="display: none;">
                    ❌ Usuário ou senha incorretos
                </div>
            </form>

            <!-- Footer -->
            <div class="login-footer">
                <p>Acesso restrito aos colaboradores autorizados</p>
                <p class="version">v1.0 - Sistema Web</p>
            </div>
        </div>

        <!-- Background Pattern -->
        <div class="background-pattern"></div>
    </div>

    <script src="auth.js"></script>
</body>
</html>
